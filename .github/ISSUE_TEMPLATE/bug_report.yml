name: Bug report
  description: Report a defect in ShadowNet
  title: "[bug]: "
  labels: [bug, triage]
  body:
    - type: markdown
      attributes:
        value: |
          Thanks for taking the time to file a bug report.

          **If this is a security vulnerability, please do not file a public issue.**
          Follow the disclosure process in [SECURITY.md](../SECURITY.md) instead.
    - type: textarea
      id: summary
      attributes:
        label: Summary
        description: A clear, concise description of the bug.
      validations:
        required: true
    - type: textarea
      id: steps
      attributes:
        label: Steps to reproduce
        description: Numbered steps so a maintainer can reproduce locally.
        placeholder: |
          1. Go to ...
          2. Click ...
          3. Observe ...
      validations:
        required: true
    - type: textarea
      id: expected
      attributes:
        label: Expected behavior
      validations:
        required: true
    - type: textarea
      id: actual
      attributes:
        label: Actual behavior
      validations:
        required: true
    - type: input
      id: env
      attributes:
        label: Environment
        description: Browser, OS, network conditions, ShadowNet version/commit
        placeholder: "Chrome 130 / macOS 14 / commit abc1234"
      validations:
        required: true
    - type: textarea
      id: logs
      attributes:
        label: Logs / screenshots
        description: Optional. Redact anything sensitive.
  