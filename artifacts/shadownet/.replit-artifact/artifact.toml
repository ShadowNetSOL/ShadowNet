kind = "web"
previewPath = "/"
title = "ShadowNet"
version = "1.0.0"
id = "artifacts/shadownet"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 18424
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/shadownet run dev"

[services.env]
PORT = "18424"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/shadownet", "run", "build"]
publicDir = "artifacts/shadownet/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
